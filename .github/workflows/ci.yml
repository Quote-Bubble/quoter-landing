name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Astro-only package: no tsconfig / no tsc typecheck script — skip.
      # No lint or test scripts in package.json — skip.

      - name: Audit (high+)
        run: npm audit --audit-level=high

      - name: LiveWidget panel height is 574
        run: |
          set -euo pipefail
          PANEL_H=$(grep -E '^\s*let panelH\s*=\s*[0-9]+' src/components/LiveWidget.astro | grep -oE '[0-9]+')
          echo "LiveWidget.astro panelH=$PANEL_H"
          test "$PANEL_H" = "574"
